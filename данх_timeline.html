<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<title>Timeline · данх</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; font-family: 'Segoe UI', sans-serif; padding: 28px; color: #d0d8e8; }
  h1 { color: #fff; font-size: 18px; margin-bottom: 4px; letter-spacing: 0.5px; }
  .subtitle { color: #556677; font-size: 12px; margin-bottom: 24px; }
  .chart-wrap { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 10px; padding: 24px; }
  .footer { color: #445566; font-size: 11px; text-align: right; margin-top: 14px; }
</style>
</head>
<body>
  <h1>📈 Engagement Timeline · данх</h1>
  <div class="subtitle">Tweet volume, likes and retweets grouped by hour (Ulaanbaatar time, UTC+8)</div>
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>
  <div class="footer">Byamba Enkhbat · data: X API</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const labels = ["03/11 17:00", "03/11 18:00", "03/11 19:00", "03/11 20:00", "03/11 21:00", "03/11 22:00", "03/11 23:00", "03/12 00:00", "03/12 01:00", "03/12 02:00", "03/12 03:00", "03/12 04:00", "03/12 05:00", "03/12 06:00", "03/12 07:00", "03/12 08:00", "03/12 09:00", "03/12 10:00", "03/12 11:00", "03/12 12:00", "03/12 13:00", "03/12 14:00", "03/12 15:00", "03/12 16:00", "03/12 17:00", "03/12 18:00", "03/12 19:00", "03/12 20:00", "03/12 21:00", "03/12 22:00", "03/12 23:00", "03/13 00:00", "03/13 01:00", "03/13 02:00"];
const ctx = document.getElementById('chart').getContext('2d');
new Chart(ctx, {
  type: 'line',
  data: {
    labels,
    datasets: [
      {
        label: 'Tweets',
        data: [4, 4, 5, 22, 45, 35, 49, 28, 19, 8, 0, 9, 3, 8, 11, 12, 22, 21, 23, 19, 20, 18, 11, 19, 10, 14, 8, 13, 6, 19, 8, 3, 2, 2],
        borderColor: '#1d9bf0',
        backgroundColor: '#1d9bf018',
        fill: true,
        tension: 0.4,
        pointRadius: 3,
        pointHoverRadius: 6,
        yAxisID: 'y',
      },
      {
        label: '❤️ Favorites',
        data: [13, 249, 85, 594, 1095, 1058, 696, 352, 280, 10, 0, 29, 25, 51, 10, 15, 242, 97, 229, 181, 188, 89, 70, 239, 68, 14, 30, 46, 2, 130, 11, 10, 1, 1],
        borderColor: '#f91880',
        backgroundColor: '#f9188018',
        fill: true,
        tension: 0.4,
        pointRadius: 3,
        pointHoverRadius: 6,
        yAxisID: 'y1',
      },
      {
        label: '🔁 Retweets',
        data: [4, 81, 16, 230, 395, 345, 221, 163, 139, 3, 0, 4, 16, 11, 1, 2, 83, 26, 94, 74, 75, 29, 29, 105, 21, 6, 9, 23, 1, 66, 3, 5, 1, 1],
        borderColor: '#00ba7c',
        backgroundColor: '#00ba7c18',
        fill: true,
        tension: 0.4,
        pointRadius: 3,
        pointHoverRadius: 6,
        yAxisID: 'y1',
      },
    ],
  },
  options: {
    responsive: true,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: {
        labels: { color: '#d0d8e8', padding: 20 },
      },
      tooltip: {
        backgroundColor: '#1a1d27',
        borderColor: '#2a2d3a',
        borderWidth: 1,
        titleColor: '#ffffff',
        bodyColor: '#d0d8e8',
      },
    },
    scales: {
      x: {
        ticks: { color: '#556677', maxTicksLimit: 12, maxRotation: 30 },
        grid:  { color: '#1e2130' },
      },
      y: {
        position: 'left',
        ticks: { color: '#1d9bf0' },
        grid:  { color: '#1e2130' },
        title: { display: true, text: 'Tweets', color: '#1d9bf0' },
      },
      y1: {
        position: 'right',
        ticks: { color: '#f91880' },
        grid:  { drawOnChartArea: false },
        title: { display: true, text: 'Engagement', color: '#f91880' },
      },
    },
  },
});
</script>
</body>
</html>
